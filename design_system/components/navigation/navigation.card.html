<!-- @dsCard group="Components" viewport="700x120" subtitle="NavTabs — active tab gets the accent underline" name="Navigation" -->
<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--paper);color:var(--ink)}
  nav{border-top:1px solid var(--border-nav-top);border-bottom:1.5px solid var(--ink);margin-top:24px}
  .inner{display:flex;gap:24px;padding:0 22px}
  .tab{background:none;border:none;font-family:var(--font-sans);font-size:14px;font-weight:400;color:var(--text-muted);padding:14px 2px;border-bottom:2px solid transparent}
  .on{font-weight:600;color:var(--ink);border-bottom-color:var(--accent)}
</style></head><body>
  <nav><div class="inner">
    <span class="tab on">Latest</span><span class="tab">Trending</span><span class="tab">Top Voted</span><span class="tab">Categories</span><span class="tab">Random</span><span class="tab">Submit</span>
  </div></nav>
</body></html>
