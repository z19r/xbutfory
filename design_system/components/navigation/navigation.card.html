<!-- @dsCard group="Components" viewport="700x150" subtitle="NavTabs (calm) vs GlossyNav (maximal)" name="Navigation" -->
<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--paper);color:var(--ink)}
  .h{font-family:var(--font-mono);font-size:9px;letter-spacing:.12em;color:var(--text-muted);padding:14px 22px 0}
  nav.calm{border-top:1px solid var(--border-nav-top);border-bottom:1.5px solid var(--ink)}
  .inner{display:flex;gap:24px;padding:0 22px}
  .tab{background:none;border:none;font-family:var(--font-sans);font-size:14px;font-weight:400;color:var(--text-muted);padding:12px 2px;border-bottom:2px solid transparent}
  .on{font-weight:600;color:var(--ink);border-bottom-color:var(--accent)}
  nav.gloss{background:linear-gradient(180deg,#CBDCF5,#A8C0E9 55%,#8FB0E2);border-top:1px solid #E2EAF8;border-bottom:1px solid #6E8FC6;box-shadow:inset 0 1px 0 rgba(255,255,255,.65),0 1px 3px rgba(40,70,120,.16);margin-top:6px}
  .ginner{display:flex;gap:4px;padding:0 22px}
  .gtab{cursor:pointer;border:1px solid transparent;font-family:var(--font-sans);font-size:14px;font-weight:500;color:#3A4E70;padding:7px 16px;margin:6px 0;border-radius:7px;background:transparent}
  .gon{font-weight:700;color:#233A63;background:linear-gradient(180deg,#fff,#EAF0FB);border-color:#B7C8E6;box-shadow:0 1px 2px rgba(40,70,120,.18),inset 0 1px 0 #fff}
</style></head><body>
  <div class="h">NAVTABS — CALM (hairline underline)</div>
  <nav class="calm"><div class="inner">
    <span class="tab on">Latest</span><span class="tab">Trending</span><span class="tab">Top Voted</span><span class="tab">Categories</span><span class="tab">Random</span><span class="tab">Submit</span>
  </div></nav>
  <div class="h">GLOSSYNAV — MAXIMAL (periwinkle gel, raised active tab)</div>
  <nav class="gloss"><div class="ginner">
    <span class="gtab gon">Latest</span><span class="gtab">Trending</span><span class="gtab">Top Voted</span><span class="gtab">Categories</span><span class="gtab">Random</span><span class="gtab">Submit</span>
  </div></nav>
</body></html>
