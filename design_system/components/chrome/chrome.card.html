<!-- @dsCard group="Components" viewport="700x110" subtitle="MastheadBar — the full-bleed ink utility bar" name="Chrome" -->
<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--paper)}
  .bar{background:var(--ink);color:var(--on-dark-muted)}
  .inner{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:9px 24px;font-family:var(--font-mono);font-size:11px;letter-spacing:.03em}
  .live{width:6px;height:6px;border-radius:50%;background:var(--accent);display:inline-block;margin-right:8px}
  .links{display:flex;gap:20px}
  .strong{color:var(--on-dark)}
  .note{font-family:var(--font-mono);font-size:10px;color:var(--text-muted);padding:18px 24px}
</style></head><body>
  <div class="bar"><div class="inner"><span><span class="live"></span>est. 2026 &mdash; vol. 1, issue 26</span><span class="links"><span>Sign in</span><span class="strong">Create account</span></span></div></div>
  <div class="note">full-bleed ink · pulsing live dot · mono colophon left, account links right</div>
</body></html>
