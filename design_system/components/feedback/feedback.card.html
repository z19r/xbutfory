<!-- @dsCard group="Components" viewport="700x280" subtitle="Toast · EmptyState" name="Feedback" -->
<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--paper);color:var(--ink);padding:22px}
  .toast{display:inline-block;background:var(--ink);color:var(--on-dark);padding:13px 20px;font-family:var(--font-mono);font-size:11px;max-width:330px;line-height:1.55;box-shadow:var(--shadow-toast);border-radius:4px;margin-right:14px}
  .empty{margin-top:8px;padding:34px 0 10px;text-align:center;border-top:1px solid var(--border-rule)}
  .et{font-family:var(--font-display);font-size:25px;font-weight:700;margin:0 0 6px}
  .em{font-family:var(--font-mono);font-size:12px;color:var(--text-muted);margin:0}
  .ea{color:var(--accent);text-decoration:underline}
</style></head><body>
  <div style="display:flex;flex-wrap:wrap;gap:14px">
    <div class="toast">&#127942; Five upvotes deep. You have taste. We respect that.</div>
    <div class="toast">&#128225; RSS: point your reader at /feed.xml — fresh entries daily.</div>
  </div>
  <div class="empty"><p class="et">Nothing here yet.</p><p class="em">No &ldquo;Figma but for ___&rdquo; in the index. <span class="ea">Be the first &rarr;</span></p></div>
</body></html>
