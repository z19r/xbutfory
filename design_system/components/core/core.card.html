<!-- @dsCard group="Components" viewport="700x340" subtitle="Button · Stamp · Tag · CodeChip" name="Core" -->
<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--paper);color:var(--ink);padding:22px}
  .grp{margin-bottom:20px}
  .h{font-family:var(--font-mono);font-size:10px;letter-spacing:.12em;color:var(--text-muted);margin-bottom:11px}
  .row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  .btn{display:inline-flex;align-items:center;gap:7px;font-family:var(--font-sans);line-height:1;border:1px solid transparent;border-radius:var(--radius-input);cursor:pointer;padding:10px 18px;font-size:14px;white-space:nowrap}
  .primary{background:var(--accent);color:#fff;font-weight:600;box-shadow:var(--shadow-button)}
  .secondary{background:var(--surface-card);color:var(--ink);border-color:var(--border-input);font-weight:500;box-shadow:0 1px 2px rgba(74,52,28,.05)}
  .ghost{background:transparent;color:var(--text-muted);font-weight:400}
  .dark{background:var(--ink);color:var(--on-dark);font-weight:500}
  .gel{color:#fff;font-weight:600;border:1px solid rgba(0,0,0,.18);background:linear-gradient(180deg,rgba(255,255,255,.32),rgba(255,255,255,.04) 46%,rgba(0,0,0,.07)),var(--accent);box-shadow:var(--shadow-button),inset 0 1px 0 rgba(255,255,255,.45)}
  .geldark{color:var(--on-dark);font-weight:600;border:1px solid rgba(0,0,0,.3);background:linear-gradient(180deg,rgba(255,255,255,.22),rgba(255,255,255,.03) 46%,rgba(0,0,0,.12)),var(--ink);box-shadow:inset 0 1px 0 rgba(255,255,255,.18)}
  .stamp{font-family:var(--font-mono);font-weight:700;font-size:10px;letter-spacing:.12em;padding:3px 8px;border:1.5px solid;border-radius:3px;display:inline-block;transform:rotate(-3deg)}
  .tag{font-family:var(--font-mono);font-size:9px;letter-spacing:.08em;padding:3px 9px;border:1px solid;border-radius:4px}
  .chip{font-family:var(--font-mono);font-size:13px;background:var(--surface-sunken);border:1px solid var(--border-input);border-radius:4px;padding:2px 9px}
</style></head><body>
  <div class="grp"><div class="h">BUTTON · VARIANTS</div>
    <div class="row">
      <span class="btn primary"><span style="font-size:17px;margin-top:-1px">+</span> Submit a Site</span>
      <span class="btn secondary">&#128225; RSS</span>
      <span class="btn ghost">Trending</span>
      <span class="btn dark">Submit for free</span>
    </div>
  </div>
  <div class="grp"><div class="h">BUTTON · GEL (maximal)</div>
    <div class="row">
      <span class="btn gel"><span style="font-size:17px;margin-top:-1px">+</span> Submit a Site</span>
      <span class="btn geldark">Sign in</span>
    </div>
  </div>
  <div class="grp"><div class="h">STAMP &amp; TAG</div>
    <div class="row">
      <span class="stamp" style="color:var(--stamp-new);border-color:var(--stamp-new)">NEW</span>
      <span class="stamp" style="color:var(--stamp-hot);border-color:var(--stamp-hot)">HOT</span>
      <span style="width:10px"></span>
      <span class="tag" style="color:var(--cat-saas);border-color:#6A3D9E66">SAAS</span>
      <span class="tag" style="color:var(--cat-dating);border-color:#B5472D66">DATING</span>
      <span class="tag" style="color:var(--cat-payments);border-color:#1B808066">FINANCE</span>
    </div>
  </div>
  <div class="grp"><div class="h">CODE CHIP</div>
    <div class="row" style="font-family:var(--font-display);font-size:22px;font-weight:500">pitch themselves as <span class="chip">X but for Y</span>.</div>
  </div>
</body></html>
