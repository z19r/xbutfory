<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>XbutforY — Maximal Home (prototype)</title>
<link rel="stylesheet" href="../../styles.css">
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; }
  body {
    color: var(--ink);
    font-family: var(--font-sans, 'Outfit', system-ui, sans-serif);
    background-color: var(--paper);
    background-image:
      radial-gradient(circle at 50% -6%, rgba(225,29,143,0.05), transparent 60%),
      var(--dots),
      var(--grain);
    background-repeat: no-repeat, repeat, repeat;
    background-size: 100% 760px, 17px 17px, 160px 160px;
    background-position: top center, 0 0, top left;
  }
  @keyframes xbfy-pulse { 0%,100% { opacity: 1; } 50% { opacity: .22; } }
  .xbfy-card { transition: transform .18s var(--ease, ease), box-shadow .18s, border-color .18s; }
  .xbfy-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-card-hover); border-color: var(--border-card-hover); }
  ::selection { background: color-mix(in srgb, var(--accent) 28%, transparent); }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>

<script src="data.js"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="feed.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
</body>
</html>
