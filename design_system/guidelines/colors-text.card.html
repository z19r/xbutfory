<!-- @dsCard group="Colors" viewport="700x210" subtitle="Warm-grey text ramp, strong → faint" name="Text ramp" -->
<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--paper);color:var(--ink);padding:20px 22px}
  .r{display:flex;align-items:baseline;gap:14px;padding:5px 0}
  .r .t{font-size:18px;font-weight:500;width:260px}
  .r .m{font-family:var(--font-mono);font-size:11px;color:var(--text-muted)}
</style></head><body>
  <div class="r"><span class="t" style="color:var(--text-strong)">The directory of X but for Y</span><span class="m">--text-strong · #171008</span></div>
  <div class="r"><span class="t" style="color:var(--text-body)">Card description body copy</span><span class="m">--text-body · #6B5F50</span></div>
  <div class="r"><span class="t" style="color:var(--text-body-soft)">Secondary prose, why it works</span><span class="m">--text-body-soft · #5A5048</span></div>
  <div class="r"><span class="t" style="color:var(--text-muted)">Labels, eyebrows &amp; meta</span><span class="m">--text-muted · #8A7D6F</span></div>
  <div class="r"><span class="t" style="color:var(--text-soft)">but for — the connective</span><span class="m">--text-soft · #9A8C7B</span></div>
  <div class="r"><span class="t" style="color:var(--text-faint)">#001 · counts · timestamps</span><span class="m">--text-faint · #B5AB9B</span></div>
</body></html>
