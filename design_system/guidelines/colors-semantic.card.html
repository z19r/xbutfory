<!-- @dsCard group="Colors" viewport="700x150" subtitle="Stamps, status & dark bar" name="Semantic" -->
<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--paper);color:var(--ink);padding:22px;display:flex;align-items:center;gap:26px;flex-wrap:wrap}
  .stamp{font-family:var(--font-mono);font-weight:700;font-size:10px;letter-spacing:.12em;padding:3px 8px;border:1.5px solid;border-radius:3px;display:inline-block;transform:rotate(-3deg)}
  .m{font-family:var(--font-mono);font-size:10px;color:var(--text-muted);margin-top:8px}
  .live{color:var(--status-live);font-size:13px;font-weight:500}
  .bar{background:var(--ink);color:var(--on-dark-muted);font-family:var(--font-mono);font-size:11px;padding:9px 14px;border-radius:6px}
</style></head><body>
  <div style="text-align:center"><span class="stamp" style="color:var(--stamp-new);border-color:var(--stamp-new)">NEW</span><div class="m">--stamp-new</div></div>
  <div style="text-align:center"><span class="stamp" style="color:var(--stamp-hot);border-color:var(--stamp-hot)">HOT</span><div class="m">--stamp-hot · #B07A1A</div></div>
  <div style="text-align:center"><span class="live">&#9679; Live &amp; launched</span><div class="m">--status-live · #2A7A56</div></div>
  <div style="text-align:center"><span class="bar">&#9679; est. 2026 — vol. 1</span><div class="m">--ink / --on-dark-muted</div></div>
</body></html>
