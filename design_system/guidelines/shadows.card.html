<!-- @dsCard group="Brand" viewport="700x210" subtitle="Warm-brown, two-layer shadows make cards float" name="Elevation" -->
<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-mono);background:var(--paper);color:var(--ink);padding:26px;display:flex;gap:28px;align-items:center;flex-wrap:wrap}
  .b{text-align:center}
  .card{width:120px;height:74px;background:var(--surface-card);border:1px solid var(--border-card);border-radius:10px}
  .btn{width:120px;height:44px;background:var(--accent);border-radius:8px}
  .l{font-size:10px;color:var(--text-muted);margin-top:11px}
</style></head><body>
  <div class="b"><div class="card" style="box-shadow:var(--shadow-card)"></div><div class="l">--shadow-card</div></div>
  <div class="b"><div class="card" style="box-shadow:var(--shadow-card-hover)"></div><div class="l">--shadow-card-hover</div></div>
  <div class="b"><div class="btn" style="box-shadow:var(--shadow-button)"></div><div class="l">--shadow-button</div></div>
  <div class="b"><div class="card" style="height:44px;box-shadow:var(--shadow-inset)"></div><div class="l">--shadow-inset</div></div>
</body></html>
