<!-- @dsCard group="Spacing" viewport="700x170" subtitle="Soft for surfaces, sharp for editorial marks" name="Corner radii" -->
<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-mono);background:var(--paper);color:var(--ink);padding:22px;display:flex;gap:20px;flex-wrap:wrap}
  .b{text-align:center}
  .sq{width:66px;height:54px;background:var(--surface-card);border:1px solid var(--border-card);box-shadow:var(--shadow-tile)}
  .l{font-size:10px;color:var(--text-muted);margin-top:9px}
</style></head><body>
  <div class="b"><div class="sq" style="border-radius:var(--radius-stamp)"></div><div class="l">stamp 3</div></div>
  <div class="b"><div class="sq" style="border-radius:var(--radius-tag)"></div><div class="l">tag 4</div></div>
  <div class="b"><div class="sq" style="border-radius:var(--radius-input)"></div><div class="l">input 8</div></div>
  <div class="b"><div class="sq" style="border-radius:var(--radius-vote)"></div><div class="l">vote 9</div></div>
  <div class="b"><div class="sq" style="border-radius:var(--radius-card)"></div><div class="l">card 10</div></div>
</body></html>
