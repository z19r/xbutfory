<!-- @dsCard group="Colors" viewport="700x180" subtitle="Warm paper surfaces + near-black ink" name="Surfaces & Ink" -->
<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--paper);color:var(--ink);padding:22px}
  .row{display:flex;gap:14px;flex-wrap:wrap}
  .sw{width:104px}
  .dot{height:54px;border-radius:8px;border:1px solid var(--border-rule);box-shadow:var(--shadow-tile)}
  .lbl{font-family:var(--font-mono);font-size:10px;margin-top:9px;color:var(--text-muted);line-height:1.5}
  .lbl b{color:var(--ink);font-weight:400}
</style></head><body>
  <div class="row">
    <div class="sw"><div class="dot" style="background:var(--paper)"></div><div class="lbl"><b>--paper</b><br>#F3EDE3</div></div>
    <div class="sw"><div class="dot" style="background:var(--surface-card)"></div><div class="lbl"><b>--surface-card</b><br>#FFFDFA</div></div>
    <div class="sw"><div class="dot" style="background:var(--surface-sunken)"></div><div class="lbl"><b>--surface-sunken</b><br>#FBF9F4</div></div>
    <div class="sw"><div class="dot" style="background:var(--surface-rail)"></div><div class="lbl"><b>--surface-rail</b><br>#E9E1D3</div></div>
    <div class="sw"><div class="dot" style="background:var(--ink)"></div><div class="lbl"><b>--ink</b><br>#171008</div></div>
    <div class="sw"><div class="dot" style="background:var(--ink)"></div><div class="lbl" style="color:var(--on-dark-muted)"><b style="color:var(--on-dark-muted)">--on-dark-muted</b><br>#C9BCA9</div></div>
  </div>
</body></html>
