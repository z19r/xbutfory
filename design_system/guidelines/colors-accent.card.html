<!-- @dsCard group="Colors" viewport="700x190" subtitle="One brand pink — themeable through curated options" name="Accent" -->
<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--paper);color:var(--ink);padding:22px;display:flex;gap:26px;align-items:center}
  .hero{width:150px;height:118px;border-radius:10px;background:var(--accent);box-shadow:var(--shadow-button);display:flex;align-items:flex-end;padding:12px;box-sizing:border-box}
  .hero b{font-family:var(--font-mono);font-size:11px;color:#fff}
  .opts{display:flex;gap:14px;flex-wrap:wrap}
  .o{width:88px}
  .chip{height:44px;border-radius:8px}
  .cl{font-family:var(--font-mono);font-size:10px;margin-top:8px;color:var(--text-muted);line-height:1.5}
  .cl b{color:var(--ink);font-weight:400}
</style></head><body>
  <div class="hero"><b>--accent<br>#E11D8F</b></div>
  <div>
    <div style="font-family:var(--font-mono);font-size:10px;letter-spacing:.14em;color:var(--text-muted);margin-bottom:12px">THEME OPTIONS</div>
    <div class="opts">
      <div class="o"><div class="chip" style="background:var(--accent-magenta)"></div><div class="cl"><b>magenta</b><br>#E11D8F</div></div>
      <div class="o"><div class="chip" style="background:var(--accent-vermilion)"></div><div class="cl"><b>vermilion</b><br>#C93B1B</div></div>
      <div class="o"><div class="chip" style="background:var(--accent-teal)"></div><div class="cl"><b>teal</b><br>#1B6E80</div></div>
      <div class="o"><div class="chip" style="background:var(--accent-violet)"></div><div class="cl"><b>violet</b><br>#6A3D9E</div></div>
      <div class="o"><div class="chip" style="background:var(--accent-ochre)"></div><div class="cl"><b>ochre</b><br>#A07A18</div></div>
      <div class="o"><div class="chip" style="background:var(--accent-ink)"></div><div class="cl"><b>ink</b><br>#171008</div></div>
    </div>
  </div>
</body></html>
