<!-- @dsCard group="Brand" viewport="700x210" subtitle="Paper grain + warm hero bloom + spectral hairline" name="Surface & texture" -->
<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-mono);color:var(--ink);padding:0}
  .stage{position:relative;padding:24px;background-color:var(--paper);background-image:var(--bloom-layer);background-repeat:no-repeat,no-repeat,repeat,repeat,repeat;background-size:100% 100%,100% 100%,17px 17px,17px 17px,160px 160px;background-position:top center,top left,0 0,8.5px 8.5px,top left;min-height:162px}
  .eye{font-size:10px;letter-spacing:.14em;color:var(--text-muted)}
  .dek{font-family:var(--font-display);font-size:24px;font-weight:500;margin:8px 0 0;max-width:520px;line-height:1.2}
  .rule{height:3px;width:220px;border-radius:2px;background:var(--spectral);margin-top:16px}
  .tag{font-size:10px;color:var(--text-faint);margin-top:14px}
</style></head><body>
  <div class="stage">
    <div class="eye">&#9679; THE WARM SURFACE</div>
    <div class="dek">Grain, bloom &amp; a spectral hairline give the paper depth.</div>
    <div class="rule"></div>
    <div class="tag">--bloom-layer (bloom ×2 + dot-grid ×2 + --grain) over --paper · rule = --spectral</div>
  </div>
</body></html>
