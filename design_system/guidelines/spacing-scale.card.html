<!-- @dsCard group="Spacing" viewport="700x180" subtitle="A loose 4px-ish editorial rhythm" name="Spacing scale" -->
<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-mono);background:var(--paper);color:var(--ink);padding:22px}
  .r{display:flex;align-items:center;gap:12px;margin-bottom:7px}
  .bar{height:13px;background:var(--accent);border-radius:2px;opacity:.85}
  .l{font-size:10px;color:var(--text-muted);width:120px}
</style></head><body>
  <div class="r"><div class="bar" style="width:8px"></div><div class="l">--space-3 · 8px</div></div>
  <div class="r"><div class="bar" style="width:16px"></div><div class="l">--space-6 · 16px</div></div>
  <div class="r"><div class="bar" style="width:22px"></div><div class="l">--space-9 · 22px (card pad)</div></div>
  <div class="r"><div class="bar" style="width:24px"></div><div class="l">--space-10 · 24px (gutter)</div></div>
  <div class="r"><div class="bar" style="width:34px"></div><div class="l">--space-14 · 34px</div></div>
  <div class="r"><div class="bar" style="width:64px"></div><div class="l">--space-18 · 64px</div></div>
  <div style="font-size:10px;color:var(--text-faint);margin-top:10px">column max --content-max 1040px · gutter 24px</div>
</body></html>
