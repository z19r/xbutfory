<!-- @dsCard group="Brand" viewport="700x200" subtitle="Typographic wordmark — no image logo" name="Wordmark" -->
<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--paper);color:var(--ink);padding:24px}
  .eye{font-family:var(--font-mono);font-size:12px;letter-spacing:.32em;color:var(--text-muted);margin-bottom:5px}
  .mark{font-family:var(--font-display);font-weight:700;font-size:58px;line-height:.9;letter-spacing:-.012em}
  .mark .but{color:var(--accent)}
  .note{font-family:var(--font-mono);font-size:10px;color:var(--text-muted);margin-top:16px;line-height:1.6}
</style></head><body>
  <div class="eye">THE DIRECTORY OF</div>
  <div class="mark">X<span class="but">but</span>forY.</div>
  <div class="note">Newsreader 700 · "X·for·Y." in --ink, the pivot "but" in --accent (it echoes the italic "but for") · the Y cycles niches on click<br>Lockup: eyebrow ("THE DIRECTORY OF") sits directly above the mark, tracking .32em</div>
</body></html>
