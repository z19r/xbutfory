<!-- @dsCard group="Type" viewport="700x180" subtitle="The signature lockup: serif name + italic connective" name="The X but for Y formula" -->
<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-display);background:var(--paper);color:var(--ink);padding:24px}
  .formula{font-size:30px;font-weight:700;line-height:1.1}
  .conn{font-style:italic;font-weight:400;color:var(--text-soft);font-size:.8em}
  .chip{font-family:var(--font-mono);font-size:14px;background:var(--surface-sunken);border:1px solid var(--border-input);border-radius:4px;padding:3px 10px;white-space:nowrap}
  .meta{font-family:var(--font-mono);font-size:10px;color:var(--text-muted);margin-top:14px}
</style></head><body>
  <div class="formula">SeatGeek<span class="conn"> but for </span>Lamps</div>
  <div style="margin-top:16px"><span class="chip">X but for Y</span></div>
  <div class="meta">serif 700 · italic "but for" in --text-soft · mono code chip for the literal phrase</div>
</body></html>
